# Running tests with tox for releasing new version

name: Pull requests fosslight_scanner

on:
  pull_request:
    branches:
      - '*'

jobs:
  check-commit-message:
    uses: fosslight/.github/.github/workflows/base-check-commit-message.yml@main
    secrets:
      envPAT: ${{ secrets.GITHUB_TOKEN }}
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxml2-dev libxslt-dev libmagic1 file
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install tox
    - name: Run Tox
      run: |
        tox -e release
  reuse:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: REUSE Compliance Check
      uses: fsfe/reuse-action@v6
