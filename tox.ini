[tox]
envlist = test_run

[testenv]
install_command = pip install {opts} {packages}
package = editable
extras = dev
allowlist_externals = cat
                      cp
                      rm
                      ls
                      pytest

[flake8]
max-line-length = 130
exclude = .tox/*

[pytest]
testpaths = tests
norecursedirs = test_result_* fixtures

[testenv:test_run]
changedir = {toxinidir}/tests

commands =
    pytest


[testenv:release]
changedir = {toxinidir}/tests

commands =
    flake8
